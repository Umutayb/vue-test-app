name: Deploy Vue Site to Pages

on:
  push:
    branches: ["main"] # Change this if your default branch is different

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/actions-setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install html-webpack-plugin --save-dev

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This matches the 'dist' folder in your Docker CMD
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4