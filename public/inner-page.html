<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inner Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark-mode {
      background-color: #121212;
      color: #eee;
    }

    .input-section {
      margin-top: 2rem;
    }

    input[type="text"] {
      padding: 8px;
      font-size: 1rem;
    }

    button {
      padding: 8px 8px;
      margin-left: 3px;
      font-size: 1rem;
    }

    .saved-text {
      margin-top: 2rem;
      font-weight: bold;
    }
  </style>
</head>
<body class="lameframe" id="lameframe"> 
  <h1>LameFrame</h1>

  <!-- Color mode toggle -->
  <button id="toggle-inner-dark" class="toggle-inner-switch">Inner Dark Mode</button>

  <!-- Input section -->
  <div class="input-section">
    <input type="text" id="userInput" placeholder="Type something..." />
    <button onclick="saveText()" >Submit</button>
    <div class="saved-text" id="savedDisplay"></div>
  </div>

  <!-- Lame Credit Card section -->
  <div style="margin-top: 40px;">
  <h2>Secure Payment Iframe (Fake)</h2>
  <iframe
    src="/lame-cc.html"
    width="350"
    height="400"
    style="border: 1px solid #aaa;"
    title="Lame Credit Card Iframe"
    id="lame-cc-iframe"
  ></iframe>
</div>

  <script>

  function updateParentStatus(isDark) {
    window.parent.postMessage(
     {
       type: 'inner-dark-mode-toggle',
       isDark: isDark,
      },'*');
  }
  console.log("📤 Sent message to parent");
  // Load saved text from localStorage
  const savedText = localStorage.getItem("iframeSavedText");
  if (savedText) {
    document.getElementById("savedDisplay").innerText = "Saved: " + savedText;
  }

  function saveText() {
    const text = document.getElementById("userInput").value;
    localStorage.setItem("iframeSavedText", text);
    document.getElementById("savedDisplay").innerText = text;
  }

  const toggleBtn = document.getElementById("toggle-inner-dark");
  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
    toggleBtn.classList.toggle("dark-mode");

    const isDark = document.body.classList.contains("dark-mode");
    localStorage.setItem("iframeDarkMode", isDark);
    
    updateParentStatus(isDark);
    
  });

  // Load dark mode state from localStorage on load
  const darkModeStored = localStorage.getItem("iframeDarkMode") === "true";
  if (darkModeStored) {
    document.body.classList.add("dark-mode");
    toggleBtn.classList.add("dark-mode");
    updateParentStatus(true);

    // reflect on parent div
    try {
      const parentDoc = window.parent.document;
      const div = parentDoc.getElementById("data-inner-dark");
      if (div) {
        div.innerText = "Inner Dark Mode: ON";
        div.style.color = "#90ee90";
        div.style.fontWeight = "bold";
      }
    } catch (err) {
      console.warn("Failed to update parent div:", err);
    }
  }
</script>

</body>
</html>
