<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inner Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark-mode {
      background-color: #121212;
      color: #eee;
    }

    .input-section {
      margin-top: 2rem;
    }

    input[type="text"] {
      padding: 8px;
      font-size: 1rem;
    }

    button {
      padding: 8px 8px;
      margin-left: 3px;
      font-size: 1rem;
    }

    .saved-text {
      margin-top: 2rem;
      font-weight: bold;
    }
  </style>
</head>
<body class="lameframe" id="lameframe"> 
  <h1>LameFrame</h1>

  <!-- Color mode toggle -->
  <button id="toggle-inner-dark" class="toggle-inner-switch">Inner Dark Mode</button>

  <!-- Input section -->
  <div class="input-section">
    <input type="text" id="userInput" placeholder="Type something..." />
    <button onclick="saveText()" >Submit</button>
    <div class="saved-text" id="savedDisplay"></div>
  </div>

  <script>
    // Load saved text from localStorage
    const savedText = localStorage.getItem("iframeSavedText");
    if (savedText) {
      document.getElementById("savedDisplay").innerText = "Saved: " + savedText;
    }

    function saveText() {
      const text = document.getElementById("userInput").value;
      localStorage.setItem("iframeSavedText", text);
      document.getElementById("savedDisplay").innerText = text;
    }

    // Dark mode toggle logic (specific to iframe page)
    const toggleBtn = document.getElementById("toggle-inner-dark");
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      document.getElementById("toggle-inner-dark").classList.toggle("dark-mode");

      // Optional: persist mode
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("iframeDarkMode", isDark);
    });

    // Load dark mode state from localStorage on load
    const darkModeStored = localStorage.getItem("iframeDarkMode") === "true";
    if (darkModeStored) {
      document.body.classList.add("dark-mode");
    }
  </script>
</body>
</html>
